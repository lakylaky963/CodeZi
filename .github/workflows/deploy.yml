name: Deploy Web App to Homelab

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      # This built-in tool handles all the authentication perfectly automatically
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Copy Files to Web Directory
        run: |
          rsync -avz --delete ./ /var/www/html/

      - name: Deploy Backend Updates
        run: |
          cd /var/www/html/backend
          npm install
          pm2 restart all || pm2 start server.js --name "backend-api"

      - name: Deploy Frontend Updates
        run: |
          cd /var/www/html/frontend
          npm install
          npm run build